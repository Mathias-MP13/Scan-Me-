<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hi, this is Mathias</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

body{

    background-image:url("motorcycle.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    position:relative;

}

/* leichte Abdunklung */

body::before{

    content:"";
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.20);

}

/* langsamer Zoom */

body::after{

    content:"";
    position:absolute;
    inset:0;

    background-image:url("motorcycle.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    animation:zoom 30s ease-in-out infinite alternate;

    z-index:-1;

}

@keyframes zoom{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }

}

.content{

    position:relative;
    z-index:10;

    width:90%;
    max-width:760px;

    text-align:center;

    text-shadow:0 2px 10px rgba(0,0,0,.8);

}

.wave{

    font-size:55px;

    display:inline-block;

    animation:wave 2s infinite;

}

@keyframes wave{

0%{transform:rotate(0deg);}
15%{transform:rotate(18deg);}
30%{transform:rotate(-8deg);}
45%{transform:rotate(18deg);}
60%{transform:rotate(-4deg);}
100%{transform:rotate(0deg);}

}

h1{

    font-size:52px;
    font-weight:700;

}

#message{

    display:none;

}

.show{

    display:block;

    animation:fadeIn 1.8s forwards;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

p{

    margin:18px 0;

    font-size:24px;

    line-height:1.6;

}

.button{

display:inline-block;

margin-top:25px;

padding:18px 38px;

background:#E1306C;

border-radius:40px;

text-decoration:none;

color:white;

font-size:20px;

font-weight:500;

transition:.3s;

box-shadow:0 8px 20px rgba(0,0,0,.4);

}

.button:hover{

transform:scale(1.06);

}

.footer{

margin-top:40px;

font-size:15px;

opacity:.9;

}

</style>

</head>

<body>

<div class="content">

<div id="intro">

<div class="wave">👋</div>

<h1>Hi, this is Mathias</h1>

</div>

<div id="message">

<p>

If you'd like to join me for a motorcycle ride sometime,<br>

I'd love to hear from you.

</p>

<p>

Maybe to Lake Constance...<br>

maybe somewhere completely different.

</p>

<p>

Let's find out.</p>

<p>

If you feel like it,<br>

just send me a message.

</p>

<a class="button"

href="https://www.instagram.com/nadermathias/"

target="_blank">

📷 Message me on Instagram

</a>

<div class="footer">

Ride safe. Maybe see you soon. 🏍️

</div>

</div>

</div>

<script>

setTimeout(function(){

document.getElementById("intro").style.display="none";

document.getElementById("message").classList.add("show");

},2500);

</script>

</body>
</html>
