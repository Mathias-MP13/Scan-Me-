<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hi, this is Mathias</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:url("motorcycle.jpg") center center/cover no-repeat fixed;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

body::before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.45);

animation:zoom 25s ease-in-out infinite alternate;

}

@keyframes zoom{

from{transform:scale(1);}
to{transform:scale(1.12);}

}

.card{

position:relative;

z-index:2;

width:min(92%,700px);

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(14px);

-webkit-backdrop-filter:blur(14px);

text-align:center;

color:white;

box-shadow:0 20px 60px rgba(0,0,0,.35);

}

.wave{

display:inline-block;

font-size:55px;

animation:wave 2.5s infinite;

}

@keyframes wave{

0%{transform:rotate(0);}
15%{transform:rotate(18deg);}
30%{transform:rotate(-8deg);}
45%{transform:rotate(18deg);}
60%{transform:rotate(-4deg);}
100%{transform:rotate(0);}

}

h1{

font-size:48px;

margin-top:10px;

font-weight:700;

}

#intro{

animation:fadeIn 1.5s forwards;

}

#message{

display:none;

opacity:0;

}

.show{

display:block !important;

animation:fadeIn 1.8s forwards;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

p{

font-size:21px;

line-height:1.8;

margin-bottom:20px;

}

.button{

display:inline-block;

margin-top:20px;

padding:16px 34px;

background:#E1306C;

color:white;

border-radius:40px;

text-decoration:none;

font-size:19px;

transition:.3s;

}

.button:hover{

transform:scale(1.05);

}

.footer{

margin-top:35px;

font-size:14px;

opacity:.8;

}

</style>

</head>

<body>

<div class="card">

<div id="intro">

<div class="wave">👋</div>

<h1>Hi, this is Mathias</h1>

</div>

<div id="message">

<p>

If you'd like to join me for a motorcycle ride sometime,

I'd love to hear from you.

</p>

<p>

Maybe to Lake Constance...

maybe somewhere completely different.

</p>

<p>

Let's find out.</p>

<p>

If you feel like it,

just send me a message.

</p>

<a class="button"

href="https://www.instagram.com/nadermathias/"

target="_blank">

📷 Message me on Instagram

</a>

<div class="footer">

Ride safe. Maybe see you soon. 🏍️

</div>

</div>

</div>

<script>

setTimeout(function(){

document.getElementById("intro").style.display="none";

document.getElementById("message").classList.add("show");

},2500);

</script>

</body>

</html>
