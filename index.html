<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Hi, this is Mathias</title>

<style>

body{

margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

}

.container{

text-align:center;
max-width:650px;
padding:30px;

}

h1{

font-size:50px;
opacity:0;
animation:fadeIn 1.2s forwards;

}

.message{

margin-top:30px;
font-size:23px;
line-height:1.6;
opacity:0;

}

.show{

animation:fadeIn 1.5s forwards;

}

button{

margin-top:35px;
padding:18px 35px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
background:#E1306C;
color:white;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.wave{

display:inline-block;
animation:wave 2s infinite;
transform-origin:70% 70%;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@keyframes wave{

0%{transform:rotate(0deg);}
15%{transform:rotate(18deg);}
30%{transform:rotate(-8deg);}
40%{transform:rotate(18deg);}
50%{transform:rotate(-4deg);}
60%{transform:rotate(10deg);}
100%{transform:rotate(0deg);}

}

</style>

</head>

<body>

<div class="container">

<h1><span class="wave">👋</span><br>Hi, this is Mathias</h1>

<div id="text" class="message">

<p>

If you'd like to join me for a motorcycle ride sometime, I'd love to hear from you.

</p>

<p>

Maybe to Lake Constance... maybe somewhere completely different.

</p>

<p>

Let's find out.

</p>

<p>

I'd love to hear from you.

</p>

<p>

If you feel like it, just send me a message.

</p>

<button onclick="window.location.href='https://www.instagram.com/nadermathias/'">

Message me on Instagram

</button>

</div>

</div>

<script>

setTimeout(function(){

document.getElementById("text").classList.add("show");

},2500);

</script>

</body>

</html>
